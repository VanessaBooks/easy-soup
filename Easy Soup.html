<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>煲汤小助手</title>
  <style>
    /*
      配色方案：中国传统文化风
      ● 中国红   #C41E3A  —— 主色，喜庆吉祥
      ● 深朱红   #8B0000  —— 按压态
      ● 金色     #D4AF37  —— 点缀，富贵长寿
      ● 浅金     #F5E6A3  —— 标签底色
      ● 宣纸米白 #FEF6E8  —— 页面背景
      ● 墨黑     #1A1A1A  —— 正文文字
    */

    /* ===== 全局基础样式 ===== */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", sans-serif;
      font-size: 20px;
      background-color: #FEF6E8;
      color: #1A1A1A;
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
    }

    /* ===== 顶部导航 ===== */
    .top-bar {
      background-color: #C41E3A;
      color: #fff;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 6px rgba(139,0,0,0.3);
    }

    .top-bar h1 {
      font-size: 22px;
      font-weight: bold;
      flex: 1;
    }

    .btn-back {
      background: rgba(255,255,255,0.2);
      border: 2px solid rgba(255,255,255,0.6);
      color: #fff;
      font-size: 18px;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
    }

    .btn-back:active {
      background: rgba(255,255,255,0.4);
    }

    /* ===== 页面容器 ===== */
    .page {
      display: none;
      padding: 20px 16px;
    }

    .page.active {
      display: block;
    }

    /* ===== 大按钮样式（首页 & 列表按钮）===== */
    .big-btn {
      display: block;
      width: 100%;
      min-height: 70px;
      background-color: #C41E3A;
      color: #fff;
      font-size: 22px;
      font-weight: bold;
      border: none;
      border-radius: 12px;
      margin-bottom: 16px;
      padding: 14px 20px;
      cursor: pointer;
      text-align: left;
      line-height: 1.4;
      box-shadow: 0 3px 6px rgba(139,0,0,0.25);
    }

    .big-btn:active {
      background-color: #8B0000;
    }

    .big-btn .btn-sub {
      font-size: 16px;
      font-weight: normal;
      opacity: 0.85;
      display: block;
      margin-top: 4px;
    }

    /* ===== 列表按钮（食材/汤名列表）===== */
    .list-btn {
      display: block;
      width: 100%;
      min-height: 64px;
      background-color: #fff;
      color: #1A1A1A;
      font-size: 21px;
      border: 2px solid #D4AF37;
      border-radius: 10px;
      margin-bottom: 12px;
      padding: 14px 16px;
      cursor: pointer;
      text-align: left;
    }

    .list-btn:active {
      background-color: #FDF2D0;
    }

    /* ===== 分类标签按钮 ===== */
    .category-btn {
      display: block;
      width: 100%;
      min-height: 64px;
      background-color: #D4AF37;
      color: #fff;
      font-size: 21px;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      margin-bottom: 12px;
      padding: 14px 16px;
      cursor: pointer;
      text-align: left;
      box-shadow: 0 2px 5px rgba(180,140,0,0.3);
    }

    .category-btn:active {
      background-color: #A88400;
    }

    /* ===== 本周推荐 - 星期卡片 ===== */
    .week-card {
      display: flex;
      align-items: center;
      background-color: #fff;
      border: 2px solid #D4AF37;
      border-radius: 10px;
      margin-bottom: 12px;
      padding: 14px 16px;
      cursor: pointer;
      gap: 14px;
    }

    .week-card:active {
      background-color: #FDF2D0;
    }

    .week-day {
      background-color: #C41E3A;
      color: #fff;
      font-size: 18px;
      font-weight: bold;
      border-radius: 8px;
      padding: 8px 12px;
      min-width: 60px;
      text-align: center;
    }

    .week-soup {
      font-size: 21px;
      font-weight: bold;
      color: #1A1A1A;
    }

    /* ===== 汤详情页 ===== */
    .detail-title {
      font-size: 28px;
      font-weight: bold;
      color: #C41E3A;
      text-align: center;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 3px solid #D4AF37;
    }

    .detail-section {
      background-color: #fff;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 14px;
      border-left: 5px solid #D4AF37;
    }

    .detail-section h3 {
      font-size: 20px;
      font-weight: bold;
      color: #C41E3A;
      margin-bottom: 10px;
    }

    .detail-section p,
    .detail-section li {
      font-size: 19px;
      line-height: 1.7;
      color: #1A1A1A;
    }

    .detail-section ul,
    .detail-section ol {
      padding-left: 20px;
    }

    .detail-section li {
      margin-bottom: 6px;
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
    }

    /* 功效标签：金底深金字 */
    .tag {
      background-color: #FDF2D0;
      color: #7A5C00;
      font-size: 17px;
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid #D4AF37;
    }

    /* 不适合人群标签：淡红底 */
    .tag.avoid {
      background-color: #FDECEA;
      color: #9B1C1C;
      border-color: #E8A0A0;
    }

    /* 替代食材标签：翠绿（玉色）*/
    .tag.replace {
      background-color: #E8F5E9;
      color: #1B5E20;
      border-color: #81C784;
    }

    /* ===== 食材功效详情 ===== */
    .ingr-title {
      font-size: 26px;
      font-weight: bold;
      color: #C41E3A;
      text-align: center;
      margin-bottom: 20px;
    }

    /* ===== 页面标题 ===== */
    .page-heading {
      font-size: 24px;
      font-weight: bold;
      color: #C41E3A;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 2px solid #D4AF37;
    }

    /* ===== 首页欢迎语 ===== */
    .home-welcome {
      text-align: center;
      color: #C41E3A;
      font-size: 18px;
      margin-bottom: 24px;
      padding: 14px 12px;
      background: #fff;
      border-radius: 10px;
      border: 2px solid #D4AF37;
    }

    .home-welcome strong {
      display: block;
      font-size: 26px;
      margin-bottom: 6px;
    }

    /* ===== 步骤样式 ===== */
    .step-item {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
      align-items: flex-start;
    }

    .step-num {
      background-color: #C41E3A;
      color: #fff;
      font-size: 16px;
      font-weight: bold;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .step-text {
      font-size: 19px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

<!-- ===== 顶部导航栏（所有页面共享）===== -->
<div class="top-bar" id="topBar">
  <h1 id="pageTitle">🍲 煲汤小助手</h1>
  <button class="btn-back" id="btnBack" onclick="goBack()" style="display:none;">← 返回</button>
</div>

<!-- ===========================
     页面 0：首页
     =========================== -->
<div class="page active" id="page-home">
  <div class="home-welcome">
    今天想喝什么汤？请选择 👇
  </div>

  <button class="big-btn" onclick="showPage('page-ingredient')">
    🥕 按食材找汤
    <span class="btn-sub">选择食材，查找对应汤品</span>
  </button>

  <button class="big-btn" onclick="showPage('page-category')">
    📋 按类型找汤
    <span class="btn-sub">按功效分类浏览汤品</span>
  </button>

  <button class="big-btn" onclick="showPage('page-weekly')">
    📅 本周推荐
    <span class="btn-sub">七天养生汤菜单</span>
  </button>

  <button class="big-btn" onclick="showPage('page-ingr-list')">
    🌿 食材功效
    <span class="btn-sub">了解各食材的营养功效</span>
  </button>
</div>

<!-- ===========================
     页面 1：按食材找汤 - 食材列表
     =========================== -->
<div class="page" id="page-ingredient">
  <div class="page-heading">🥕 请选择主食材</div>
  <div id="ingredient-list"></div>
</div>

<!-- ===========================
     页面 1b：子食材列表（如菌菇类、海鲜类、素菜类的具体选项）
     =========================== -->
<div class="page" id="page-subingredient">
  <div class="page-heading" id="subingredient-title">请选择种类</div>
  <div id="subingredient-list"></div>
</div>

<!-- ===========================
     页面 2：某食材的汤品列表
     =========================== -->
<div class="page" id="page-soup-list">
  <div class="page-heading" id="soup-list-title">汤品列表</div>
  <div id="soup-list"></div>
</div>

<!-- ===========================
     页面 3：按类型找汤 - 分类列表
     =========================== -->
<div class="page" id="page-category">
  <div class="page-heading">📋 请选择汤品类型</div>
  <div id="category-list"></div>
</div>

<!-- ===========================
     页面 4：本周推荐
     =========================== -->
<div class="page" id="page-weekly">
  <div class="page-heading">📅 本周煲汤推荐</div>
  <div id="weekly-list"></div>
  <button class="big-btn" onclick="regenerateWeekly()" style="margin-top:8px;">
    🎲 重新生成本周菜单
    <span class="btn-sub">随机为您搭配七天养生汤</span>
  </button>
</div>

<!-- ===========================
     页面 5：汤品详情
     =========================== -->
<div class="page" id="page-soup-detail">
  <div class="detail-title" id="detail-soup-name"></div>
  <div id="detail-content"></div>
</div>

<!-- ===========================
     页面 6：食材功效 - 食材列表
     =========================== -->
<div class="page" id="page-ingr-list">
  <div class="page-heading">🌿 请选择食材</div>
  <div id="ingr-list"></div>
</div>

<!-- ===========================
     页面 7：食材功效详情
     =========================== -->
<div class="page" id="page-ingr-detail">
  <div class="ingr-title" id="ingr-detail-name"></div>
  <div id="ingr-detail-content"></div>
</div>


<script>
  /* ============================================================
     数据区：汤品数据（soups）
     每个汤包含：名称、主食材、分类、配料、步骤、功效、适合人群、不适合人群、可替代食材
  ============================================================ */
  const soups = [
    {
      name: "山药排骨汤",
      mainIngredient: "排骨",
      category: ["清淡养胃", "健脾开胃", "滋补强身"],
      mainMaterial: "排骨 500g、山药 300g",
      ingredients: ["枸杞 10粒", "生姜 3片", "盐 适量", "料酒 1汤匙"],
      steps: [
        "排骨洗净，冷水下锅焯水2分钟，捞出备用。",
        "山药去皮切块，泡入清水中防止氧化。",
        "锅中加入清水，放入排骨、姜片和料酒，大火煮开。",
        "转小火，加入山药，继续炖煮40分钟。",
        "出锅前加盐调味，撒入枸杞即可。"
      ],
      benefits: ["健脾养胃", "补钙强骨", "滋阴润燥", "帮助消化"],
      suitableFor: ["脾胃虚弱者", "骨质疏松人群", "老年人", "术后恢复期"],
      avoidFor: ["痛风患者", "高嘌呤饮食人群", "肾病患者（请遵医嘱）"],
      replacements: { "山药": ["莲藕", "白萝卜", "土豆"] }
    },
    {
      name: "莲藕排骨汤",
      mainIngredient: "排骨",
      category: ["清淡养胃", "补气养血", "健脾开胃"],
      mainMaterial: "排骨 500g、莲藕 400g",
      ingredients: ["生姜 4片", "红枣 5颗", "盐 适量", "料酒 1汤匙"],
      steps: [
        "排骨焯水，去血水杂质，捞出备用。",
        "莲藕刮皮切厚片，红枣洗净去核。",
        "汤锅中加足量清水，放入排骨、姜片和料酒，大火烧开。",
        "放入莲藕和红枣，转小火慢炖50分钟。",
        "加盐调味，出锅享用。"
      ],
      benefits: ["补气养血", "健脾开胃", "清热凉血", "补铁补血"],
      suitableFor: ["气血不足者", "贫血人群", "食欲不振者", "女性调理"],
      avoidFor: ["脾胃虚寒腹泻者（莲藕性凉）", "痛风急性期患者"],
      replacements: { "莲藕": ["山药", "玉米", "冬瓜"] }
    },
    {
      name: "玉米胡萝卜排骨汤",
      mainIngredient: "排骨",
      category: ["清淡养胃", "增强免疫", "健脾开胃"],
      mainMaterial: "排骨 500g、玉米 2根、胡萝卜 2根",
      ingredients: ["生姜 3片", "盐 适量", "料酒 1汤匙"],
      steps: [
        "排骨冷水下锅焯水，撇去浮沫，捞出备用。",
        "玉米切段，胡萝卜切滚刀块。",
        "将排骨、姜片和料酒放入汤锅，加清水大火煮开。",
        "加入玉米和胡萝卜，转小火炖40分钟。",
        "加盐调味即可出锅。"
      ],
      benefits: ["增强免疫力", "明目养肝", "补钙强身", "健脾利湿"],
      suitableFor: ["儿童及老人", "免疫力低下者", "眼睛干涩者", "日常保健"],
      avoidFor: ["血糖偏高者（玉米含糖）请适量", "糖尿病患者请咨询医生"],
      replacements: { "胡萝卜": ["南瓜", "番茄"], "玉米": ["莲藕", "山药"] }
    },
    {
      name: "菌菇排骨汤",
      mainIngredient: "排骨",
      category: ["增强免疫", "补气养血", "滋补强身"],
      mainMaterial: "排骨 500g、香菇 6朵、金针菇 100g",
      ingredients: ["蟹味菇 100g", "生姜 3片", "盐 适量", "料酒 1汤匙", "枸杞少许"],
      steps: [
        "排骨焯水备用，各类菌菇洗净撕小块。",
        "汤锅中放入排骨、姜片和料酒，加水大火烧开。",
        "撇去浮沫，转小火炖30分钟。",
        "加入各类菌菇，继续炖20分钟。",
        "加盐调味，加入枸杞，出锅。"
      ],
      benefits: ["增强免疫力", "抗疲劳", "补气益血", "防癌抗老"],

    },
    {

      mainIngredient: "鸡肉",

      steps: [

        "汤锅中加入足量清水，放入猪骨、姜片和料酒，大火烧开。",
        "转小火，加入玉米和胡萝卜，慢炖1小时。",
        "加枸杞和盐调味，即可出锅。"
      ],
      benefits: ["补钙强骨", "明目养肝", "健脾开胃", "促进生长发育"],

      avoidFor: ["痛风急性期", "高嘌呤饮食限制者", "肾功能不全者请遵医嘱"],
      replacements: { "猪骨": ["排骨"], "胡萝卜": ["南瓜", "莲藕"] }
    },
    {
      name: "冬瓜海带汤",
      mainIngredient: "冬瓜",

  /* ============================================================
     导航历史：用于"返回"功能
  ============================================================ */
  let pageHistory = [];

  /* ============================================================
     showPage()：核心页面切换函数
     pageId: 目标页面的 ID
     title: 顶部标题文字
     record: 是否记录进历史（默认 true）
  ============================================================ */
  function showPage(pageId, title, record = true) {
    // 隐藏当前显示的页面
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    // 显示目标页面
    document.getElementById(pageId).classList.add('active');

    // 更新顶部标题
    const titles = {
      'page-home': '🍲 煲汤小助手',
      'page-ingredient': '按食材找汤',
      'page-subingredient': title || '请选择种类',
      'page-soup-list': title || '汤品列表',
      'page-category': '按类型找汤',
      'page-weekly': '本周推荐',
      'page-soup-detail': title || '汤品详情',
      'page-ingr-list': '食材功效',
      'page-ingr-detail': title || '食材详情'
    };
    document.getElementById('pageTitle').textContent = titles[pageId] || title || '煲汤小助手';

    // 首页隐藏返回按钮，其他页面显示
    document.getElementById('btnBack').style.display = (pageId === 'page-home') ? 'none' : 'block';

    // 记录页面历史
    if (record) {
      pageHistory.push(pageId);
    }
  }

  /* ============================================================
     goBack()：返回上一页
  ============================================================ */
  function goBack() {
    if (pageHistory.length > 1) {
      pageHistory.pop(); // 移除当前页
      const prevPage = pageHistory[pageHistory.length - 1];
      pageHistory.pop(); // 移除上一页（showPage 会重新添加）
      showPage(prevPage);
    } else {
      // 退回首页
      pageHistory = [];
      showPage('page-home');
    }
  }

  /* ============================================================
     渲染食材列表（功能1）——使用 ingredientGroups 分组数据
     有子分类的显示 › 箭头，点击后进入子食材选择页
     无子分类的直接进入汤品列表
  ============================================================ */
  function renderIngredientList() {
    const container = document.getElementById('ingredient-list');
    container.innerHTML = '';
    ingredientGroups.forEach(g => {
      const btn = document.createElement('button');
      btn.className = 'list-btn';
      if (g.items) {
        btn.textContent = g.icon + ' ' + g.group + '  ›';
        btn.onclick = () => showSubIngredients(g.group, g.items, g.icon);
      } else {
        btn.textContent = g.icon + ' ' + g.group;
        btn.onclick = () => showSoupsByIngredient(g.group);
      }
      container.appendChild(btn);
    });
  }

      const btn = document.createElement('button');
      btn.className = 'list-btn';
      btn.textContent = icon + ' ' + item;
      btn.onclick = () => showSoupsByIngredient(item);
      container.appendChild(btn);
    });
    showPage('page-subingredient', groupName);
  }

  /* ============================================================
     显示某食材对应的汤品列表
  ============================================================ */
  function showSoupsByIngredient(ingredient) {
    const filtered = soups.filter(s => s.mainIngredient === ingredient);
    document.getElementById('soup-list-title').textContent = '🍲 ' + ingredient + ' 相关汤品';
    renderSoupList(filtered);
    showPage('page-soup-list', ingredient + '汤品');
  }

  /* ============================================================
     渲染分类列表（功能2）
  ============================================================ */
  function renderCategoryList() {
    const categories = ["清淡养胃", "补气养血", "增强免疫", "滋补强身", "健脾开胃", "清热消暑"];
    const icons = { "清淡养胃": "🌱", "补气养血": "❤️", "增强免疫": "💪", "滋补强身": "🌟", "健脾开胃": "🍽️", "清热消暑": "🌊" };
    const container = document.getElementById('category-list');
    container.innerHTML = '';
    categories.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'category-btn';
      btn.textContent = (icons[cat] || '📋') + ' ' + cat;
      btn.onclick = () => showSoupsByCategory(cat);
      container.appendChild(btn);
    });
  }

  /* ============================================================
     显示某类型的汤品列表
  ============================================================ */
  function showSoupsByCategory(category) {
    const filtered = soups.filter(s => s.category.includes(category));
    document.getElementById('soup-list-title').textContent = '📋 ' + category + ' 汤品';
    renderSoupList(filtered);
    showPage('page-soup-list', category);
  }

  /* ============================================================
     渲染汤品列表（通用）
  ============================================================ */
  function renderSoupList(soupList) {
    const container = document.getElementById('soup-list');
    container.innerHTML = '';
    if (soupList.length === 0) {
      container.innerHTML = '<p style="font-size:20px;color:#888;text-align:center;padding:20px;">暂无相关汤品</p>';
      return;
    }
    soupList.forEach(soup => {
      const btn = document.createElement('button');
      btn.className = 'list-btn';
      btn.textContent = '🍲 ' + soup.name;
      btn.onclick = () => showSoupDetail(soup.name);
      container.appendChild(btn);
    });
  }

  /* ============================================================
     显示汤品详情（功能1/2/3通用）
  ============================================================ */
  function showSoupDetail(soupName) {
    const soup = soups.find(s => s.name === soupName);
    if (!soup) return;

    document.getElementById('detail-soup-name').textContent = soup.name;

    let html = '';

    // 主材料
    html += `<div class="detail-section">
      <h3>🥩 主材料</h3>
      <p>${soup.mainMaterial}</p>
    </div>`;

    // 配料
    html += `<div class="detail-section">
      <h3>🧂 配料</h3>
      <ul>${soup.ingredients.map(i => `<li>${i}</li>`).join('')}</ul>
    </div>`;

    // 做法
    html += `<div class="detail-section">
      <h3>👨‍🍳 做法</h3>
      ${soup.steps.map((step, idx) => `
        <div class="step-item">
          <div class="step-num">${idx + 1}</div>
          <div class="step-text">${step}</div>
        </div>`).join('')}
    </div>`;

    // 功效
    html += `<div class="detail-section">
      <h3>✨ 功效</h3>
      <div class="tag-list">${soup.benefits.map(b => `<span class="tag">${b}</span>`).join('')}</div>
    </div>`;

    // 适合人群
    html += `<div class="detail-section">
      <h3>👍 适合人群</h3>
      <ul>${soup.suitableFor.map(s => `<li>${s}</li>`).join('')}</ul>
    </div>`;

    // 不适合人群
    html += `<div class="detail-section">
      <h3>⚠️ 不适合人群</h3>
      <div class="tag-list">${soup.avoidFor.map(a => `<span class="tag avoid">${a}</span>`).join('')}</div>
    </div>`;

    // 可替代食材
    if (soup.replacements && Object.keys(soup.replacements).length > 0) {
      let replHtml = '';
      for (const [key, vals] of Object.entries(soup.replacements)) {
        replHtml += `<p style="font-size:19px;margin-bottom:8px;"><strong>${key}</strong> 可替代为：</p>
        <div class="tag-list">${vals.map(v => `<span class="tag replace">${v}</span>`).join('')}</div>`;
      }
      html += `<div class="detail-section">
        <h3>🔄 可替代食材</h3>
        ${replHtml}
      </div>`;
    }

    document.getElementById('detail-content').innerHTML = html;
    showPage('page-soup-detail', soup.name);
  }

  /* ============================================================
     渲染本周推荐（功能3）
  ============================================================ */
  function renderWeeklyMenu() {
    const container = document.getElementById('weekly-list');
    container.innerHTML = '';
    weeklyMenu.forEach(item => {
      const card = document.createElement('div');
      card.className = 'week-card';
      card.onclick = () => showSoupDetail(item.soupName);
      card.innerHTML = `
        <div class="week-day">${item.day}</div>
        <div class="week-soup">🍲 ${item.soupName}</div>
      `;
      container.appendChild(card);
    });
  }

  /* ============================================================
     重新随机生成本周菜单
  ============================================================ */
  function regenerateWeekly() {
    const days = ["周一", "周二", "周三", "周四", "周五", "周六", "周日"];
    // 随机打乱所有汤品，取前7个（保证不重复）
    const shuffled = [...soups].sort(() => Math.random() - 0.5);
    const picked = shuffled.slice(0, 7);
    weeklyMenu.length = 0;
    picked.forEach((soup, i) => {
      weeklyMenu.push({ day: days[i], soupName: soup.name });
    });
    renderWeeklyMenu();
  }

  /* ============================================================
     渲染食材功效列表（功能4）
  ============================================================ */
  function renderIngrList() {
    const container = document.getElementById('ingr-list');
    container.innerHTML = '';
    ingredientsInfo.forEach(ingr => {
      const btn = document.createElement('button');
      btn.className = 'list-btn';
      btn.textContent = '🌿 ' + ingr.name;
      btn.onclick = () => showIngrDetail(ingr.name);
      container.appendChild(btn);
    });
  }

  /* ============================================================
     显示食材功效详情
  ============================================================ */
  function showIngrDetail(ingrName) {
    const ingr = ingredientsInfo.find(i => i.name === ingrName);
    if (!ingr) return;

    document.getElementById('ingr-detail-name').textContent = '🌿 ' + ingr.name;

    let html = '';

    // 功效
    html += `<div class="detail-section">
      <h3>✨ 功效</h3>
      <div class="tag-list">${ingr.benefits.map(b => `<span class="tag">${b}</span>`).join('')}</div>
    </div>`;

    // 适合人群
    html += `<div class="detail-section">
      <h3>👍 适合人群</h3>
      <ul>${ingr.suitableFor.map(s => `<li>${s}</li>`).join('')}</ul>
    </div>`;

    // 不适合人群
    html += `<div class="detail-section">
      <h3>⚠️ 不适合人群</h3>
      <div class="tag-list">${ingr.avoidFor.map(a => `<span class="tag avoid">${a}</span>`).join('')}</div>
    </div>`;

    // 推荐搭配
    html += `<div class="detail-section">
      <h3>🤝 推荐搭配</h3>
      <div class="tag-list">${ingr.pairWith.map(p => `<span class="tag replace">${p}</span>`).join('')}</div>
    </div>`;

    document.getElementById('ingr-detail-content').innerHTML = html;
    showPage('page-ingr-detail', ingr.name);
  }

  /* ============================================================
     初始化：页面加载时预渲染各列表数据
  ============================================================ */
  (function init() {
    renderIngredientList();
    renderCategoryList();
    renderWeeklyMenu();
    renderIngrList();
    // 首页历史初始化
    pageHistory = ['page-home'];
  })();

</script>
</body>
</html>
